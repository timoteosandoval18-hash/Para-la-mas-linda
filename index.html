<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para la niña de ojitos lindos</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background-color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .container {
            display: flex;
            align-items: center;
            gap: 50px;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            justify-content: flex-start;
        }
        
        .dibujo {
            max-width: 350px;
            width: 100%;
            height: auto;
            flex-shrink: 0;
        }
        
        .texto {
            font-size: 30px;
            color: #ff1493;
            text-align: left;
            line-height: 1.3;
            font-weight: 700;
            margin-left: auto;
            padding-right: 20px;
        }
        
        @media (max-width: 768px) {
            body { padding: 20px; }
            .container { flex-direction: column; gap: 25px; }
            .texto {
                margin-left: 0;
                padding-right: 0;
                text-align: right;
                font-size: 26px;
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="conejito.png" alt="Conejito con lirio" class="dibujo">
        
        <div class="texto">
            Para<br>
            La<br>
            Niña<br>
            De<br>
            Ojitos<br>
            Lindos,<br>
            La<br>
            Más<br>
            Hermosa<br>
            Del<br>
            Mundo💕
        </div>
    </div>
</body>
  </html>
